workflows:
  ios-simulator:
    name: ZoneWise iOS Simulator Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Build for Simulator
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Package .app for Appetize
        script: |
          APP_PATH=$(find ios/App/build/Build/Products -name "App.app" -path "*iphonesimulator*" | head -1)
          cd "$(dirname "$APP_PATH")"
          zip -r /tmp/ZoneWise-Simulator.zip App.app
    artifacts:
      - /tmp/ZoneWise-Simulator.zip
