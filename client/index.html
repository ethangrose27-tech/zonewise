<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>ZoneWise — SW Florida Zoning & Permit Guide</title>
    <meta name="description" content="Interactive zoning maps, permit calculator, contractor verification, and professional referrals for SW Florida homeowners. Brooksville to Naples." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZoneWise" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0e7490" />
    <meta name="msapplication-TileColor" content="#0e7490" />

    <!-- Fonts -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- iOS splash screens and safe area -->
    <style>
      /* iOS safe area support */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: text;
        overscroll-behavior-y: contain;
      }
      /* Prevent pull-to-refresh in standalone mode */
      html {
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(
            (reg) => console.log('SW registered:', reg.scope),
            (err) => console.warn('SW registration failed:', err)
          );
        });
      }
    </script>
  </body>
</html>
